<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 — 했제</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .admin-wrap { padding: 100px 24px 60px; max-width: 1280px; margin: 0 auto; }
    .admin-header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: end; flex-wrap: wrap; gap: 16px; }
    .admin-header h1 { font-size: 28px; font-weight: 900; }
    .admin-header p { color: var(--gray); font-size: 14px; margin-top: 4px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
    .stat-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
    .stat-box .label { font-size: 12px; color: var(--gray); letter-spacing: 0.1em; }
    .stat-box .value { font-size: 28px; font-weight: 900; font-family: 'Montserrat', sans-serif; color: var(--lime); margin-top: 8px; }

    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .tab-btn {
      background: none; border: none; color: var(--gray); padding: 14px 20px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { color: var(--lime); border-bottom-color: var(--lime); }

    .panel { display: none; }
    .panel.active { display: block; }

    table { width: 100%; border-collapse: collapse; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    th, td { padding: 14px 16px; text-align: left; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    th { background: rgba(255,255,255,0.03); color: var(--gray); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; font-size: 11px; }
    tr:hover { background: rgba(255,255,255,0.02); }
    tr:last-child td { border-bottom: none; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .badge-plan-start { background: rgba(255,255,255,0.1); color: var(--white); }
    .badge-plan-vip { background: var(--lime-dim); color: var(--lime); }
    .badge-plan-svip { background: rgba(255,215,0,0.15); color: var(--gold); }
    .badge-plan-none { background: rgba(136,136,136,0.15); color: var(--gray); }
    .badge-done { background: rgba(212,255,0,0.15); color: var(--lime); }
    .badge-pending { background: rgba(136,136,136,0.15); color: var(--gray); }

    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 4px; cursor: pointer; border: none; font-weight: 700; }
    .btn-extend { background: var(--lime-dim); color: var(--lime); border: 1px solid var(--lime); }
    .btn-remove { background: rgba(255,85,85,0.1); color: #ff5555; border: 1px solid rgba(255,85,85,0.4); }
    .btn-assign { background: rgba(255,255,255,0.06); color: var(--white); border: 1px solid var(--border); }
    .btn-password { background: rgba(100,150,255,0.1); color: #6496ff; border: 1px solid rgba(100,150,255,0.4); }
    .btn-confirm { background: var(--lime); color: #000; border: none; }
    .btn-cancel { background: rgba(255,85,85,0.1); color: #ff5555; border: 1px solid rgba(255,85,85,0.4); }

    .badge-cancelled { background: rgba(255,85,85,0.15); color: #ff7777; }
    .badge-refunded { background: rgba(255,165,0,0.15); color: #ffaa44; }

    .empty { text-align: center; color: var(--gray); padding: 48px; }

    /* 플랜 부여 모달 */
    .amodal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px); z-index: 200;
      display: flex; align-items: center; justify-content: center;
    }
    .amodal-box {
      background: #12121a; border: 1px solid var(--border);
      border-radius: 16px; padding: 32px 28px;
      width: 100%; max-width: 420px;
    }
    .amodal-box h3 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .amodal-box .amodal-sub { color: var(--gray); font-size: 13px; margin-bottom: 24px; }
    .amodal-label { font-size: 12px; color: var(--gray); letter-spacing: 0.08em; font-weight: 700; margin-bottom: 10px; }
    .plan-btns { display: flex; gap: 10px; margin-bottom: 24px; }
    .plan-btn {
      flex: 1; padding: 14px; border-radius: 8px; cursor: pointer;
      border: 2px solid var(--border); background: var(--card-bg);
      color: var(--white); font-size: 14px; font-weight: 700;
      transition: all 0.2s;
    }
    .plan-btn:hover { border-color: var(--lime); }
    .plan-btn.selected { border-color: var(--lime); background: var(--lime-dim); color: var(--lime); }
    .plan-btn.vip-btn.selected { border-color: var(--gold); background: rgba(255,215,0,0.1); color: var(--gold); }
    .plan-btn.trial-btn.selected { border-color: #7ec8e3; background: rgba(126,200,227,0.1); color: #7ec8e3; }
    .badge-plan-trial { background: rgba(126,200,227,0.15); color: #7ec8e3; }
    .days-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .days-input {
      width: 90px; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--card-bg);
      color: var(--white); font-size: 16px; font-weight: 700; text-align: center;
    }
    .days-input:focus { outline: none; border-color: var(--lime); }
    .days-stepper { display: flex; flex-direction: column; gap: 4px; }
    .step-btn {
      width: 28px; height: 22px; border-radius: 4px; border: 1px solid var(--border);
      background: var(--card-bg); color: var(--white); cursor: pointer;
      font-size: 14px; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .step-btn:hover { background: var(--lime-dim); color: var(--lime); }
    .amodal-actions { display: flex; gap: 10px; }

    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      table { font-size: 12px; }
      th, td { padding: 10px 8px; }
    }
  </style>
</head>
<body>

<nav id="navbar">
  <a href="/" class="logo">Haessje<span class="dot">.</span> <span style="color:var(--lime); font-size:13px; margin-left:8px;">ADMIN</span></a>
  <div class="nav-right">
    <a href="/dashboard" class="btn-ghost">대시보드</a>
    <button class="btn-ghost" onclick="logout()">로그아웃</button>
  </div>
</nav>

<div class="admin-wrap">
  <div class="admin-header">
    <div>
      <h1>관리자 콘솔</h1>
      <p id="admin-greeting">Loading...</p>
    </div>
  </div>

  <!-- 매출 기간 필터 -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
    <span style="font-size:12px;color:var(--gray);font-weight:700;letter-spacing:0.08em;">매출 기간</span>
    <select id="filter-year" onchange="loadStats()" style="background:var(--card-bg);border:1px solid var(--border);color:var(--white);padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;">
      <option value="">전체</option>
    </select>
    <select id="filter-month" onchange="loadStats()" style="background:var(--card-bg);border:1px solid var(--border);color:var(--white);padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;">
      <option value="">전체 월</option>
      <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
      <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
      <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
      <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
    </select>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="label">전체 회원</div>
      <div class="value" id="stat-users">0</div>
    </div>
    <div class="stat-box">
      <div class="label">구독 중인 회원</div>
      <div class="value" id="stat-active">0</div>
    </div>
    <div class="stat-box">
      <div class="label">결제건수</div>
      <div class="value" id="stat-paid">0</div>
    </div>
    <div class="stat-box">
      <div class="label">매출</div>
      <div class="value" id="stat-revenue">₩0</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="users">회원 관리</button>
    <button class="tab-btn" data-tab="orders">주문 내역</button>
  </div>

  <!-- 회원 패널 -->
  <div class="panel active" id="panel-users">
    <table>
      <thead>
        <tr>
          <th>ID</th><th>이메일</th><th>이름</th><th>연락처</th>
          <th>현재 플랜</th><th>만료일</th><th>가입일</th><th style="width:240px;">작업</th>
        </tr>
      </thead>
      <tbody id="users-body">
        <tr><td colspan="8" class="empty">로딩 중...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 주문 패널 -->
  <div class="panel" id="panel-orders">
    <table>
      <thead>
        <tr>
          <th>주문 ID</th><th>회원</th><th>입금자명</th><th>플랜</th><th>금액</th><th>상태</th><th>주문일</th><th style="width:200px;">작업</th>
        </tr>
      </thead>
      <tbody id="orders-body">
        <tr><td colspan="8" class="empty">로딩 중...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const PLAN_NAMES = { trial: '무료체험', start: '스타트', vip: 'VIP' };

function fmtDate(iso) { return iso ? new Date(iso).toLocaleDateString('ko-KR') : '-'; }
function fmtWon(n) { return '₩' + Number(n).toLocaleString(); }

async function checkAdmin() {
  try {
    const res = await fetch('/api/admin/check', { credentials: 'include' });
    if (!res.ok) {
      alert('관리자 권한이 없습니다.');
      window.location.href = '/';
      return false;
    }
    const data = await res.json();
    document.getElementById('admin-greeting').textContent = `${data.email} 로 로그인됨`;
    return true;
  } catch {
    window.location.href = '/login';
    return false;
  }
}

// 연도 셀렉트 초기화
function initYearFilter() {
  const sel = document.getElementById('filter-year');
  const cur = new Date().getFullYear();
  for (let y = cur; y >= 2025; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = `${y}년`;
    sel.appendChild(opt);
  }
  sel.value = cur; // 기본값: 현재 연도
}

async function loadStats() {
  const year  = document.getElementById('filter-year').value;
  const month = document.getElementById('filter-month').value;
  const params = new URLSearchParams();
  if (year)  params.set('year', year);
  if (month) params.set('month', month);

  const res = await fetch(`/api/admin/stats?${params}`, { credentials: 'include' });
  const d = await res.json();
  document.getElementById('stat-users').textContent = d.totalUsers;
  document.getElementById('stat-active').textContent = d.activeSubs;
  document.getElementById('stat-paid').textContent = d.paidCount;
  document.getElementById('stat-revenue').textContent = fmtWon(d.totalRevenue);
}

async function loadUsers() {
  const res = await fetch('/api/admin/users', { credentials: 'include' });
  const { users } = await res.json();
  const body = document.getElementById('users-body');

  if (users.length === 0) {
    body.innerHTML = '<tr><td colspan="8" class="empty">등록된 회원이 없습니다</td></tr>';
    return;
  }

  body.innerHTML = users.map(u => {
    const planBadge = u.plan
      ? `<span class="badge badge-plan-${u.plan}">${PLAN_NAMES[u.plan]}</span>`
      : `<span class="badge badge-plan-none">없음</span>`;
    return `
      <tr>
        <td>#${u.id}</td>
        <td>${u.email}</td>
        <td>${u.name}</td>
        <td>${u.phone || '-'}</td>
        <td>${planBadge}</td>
        <td>${fmtDate(u.plan_expires_at)}</td>
        <td>${fmtDate(u.created_at)}</td>
        <td>
          <div class="row-actions">
            <button class="btn-sm btn-assign" onclick="assignPlan(${u.id}, '${u.name}')">플랜 부여</button>
            <button class="btn-sm btn-extend" onclick="changePeriod(${u.id}, '${u.name}', '${u.plan_expires_at || ''}')">기간 변경</button>
            <button class="btn-sm btn-remove" onclick="removePlan(${u.id}, '${u.name}')">해제</button>
            <button class="btn-sm btn-password" onclick="resetPassword(${u.id}, '${u.name}')">비번 재설정</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

async function loadOrders() {
  const res = await fetch('/api/admin/orders', { credentials: 'include' });
  const { orders } = await res.json();
  const body = document.getElementById('orders-body');

  if (orders.length === 0) {
    body.innerHTML = '<tr><td colspan="8" class="empty">주문이 없습니다</td></tr>';
    return;
  }

  const statusLabel = (s) => s === 'done' ? '입금완료' : s === 'cancelled' ? '취소됨' : s === 'refunded' ? '환불됨' : '입금대기';

  body.innerHTML = orders.map(o => {
    const actions = o.status === 'pending'
      ? `<div class="row-actions">
           <button class="btn-sm btn-confirm" onclick="confirmOrder('${o.order_id}', '${o.user_name || ''}')">입금 확인</button>
           <button class="btn-sm btn-cancel" onclick="cancelOrder('${o.order_id}')">취소</button>
         </div>`
      : o.status === 'done'
      ? `<div class="row-actions">
           <button class="btn-sm btn-remove" onclick="refundOrder('${o.order_id}', '${o.user_name || ''}')">환불 처리</button>
         </div>`
      : `<span style="color:var(--gray); font-size:12px;">-</span>`;

    const depositor = o.depositor
      ? `<strong style="color:var(--lime);">${o.depositor}</strong>`
      : `<span style="color:var(--gray); font-size:12px;">-</span>`;

    return `
      <tr>
        <td style="font-family:monospace; font-size:11px; color:var(--gray);">${o.order_id}</td>
        <td>${o.user_name || '-'}<br/><span style="color:var(--gray); font-size:11px;">${o.user_email || ''}</span></td>
        <td>${depositor}</td>
        <td><span class="badge badge-plan-${o.plan}">${PLAN_NAMES[o.plan]}</span></td>
        <td>${fmtWon(o.amount)}</td>
        <td><span class="badge badge-${o.status}">${statusLabel(o.status)}</span></td>
        <td>${new Date(o.created_at).toLocaleString('ko-KR')}</td>
        <td>${actions}</td>
      </tr>
    `;
  }).join('');
}

async function confirmOrder(orderId, userName) {
  if (!confirm(`주문 ${orderId} (${userName})의 입금을 확인하고 플랜을 활성화하시겠습니까?`)) return;

  const res = await fetch(`/api/admin/orders/${orderId}/confirm`, {
    method: 'POST', credentials: 'include',
  });
  const data = await res.json();
  if (res.ok) {
    alert(`플랜이 활성화되었습니다.\n만료일: ${new Date(data.expiresAt).toLocaleDateString('ko-KR')}`);
    loadOrders(); loadUsers(); loadStats();
  } else {
    alert(data.error || '오류');
  }
}

async function cancelOrder(orderId) {
  if (!confirm(`주문 ${orderId}를 취소하시겠습니까?`)) return;

  const res = await fetch(`/api/admin/orders/${orderId}/cancel`, {
    method: 'POST', credentials: 'include',
  });
  const data = await res.json();
  if (res.ok) { alert('취소되었습니다.'); loadOrders(); }
  else alert(data.error || '오류');
}

// ── 플랜 부여 모달 ──
let _planModalCallback = null;

function openPlanModal({ userId, userName, fixedPlan = null, title }) {
  const isExtend = !!fixedPlan;

  const overlay = document.createElement('div');
  overlay.className = 'amodal-overlay';
  overlay.innerHTML = `
    <div class="amodal-box">
      <h3>${title}</h3>
      <p class="amodal-sub">${userName}님</p>

      ${!isExtend ? `
      <p class="amodal-label">플랜 선택</p>
      <div class="plan-btns">
        <button class="plan-btn trial-btn" data-plan="trial" data-days="7" onclick="selectPlanBtn(this)">
          7일 무료체험<br/><span style="font-size:11px;font-weight:400;opacity:0.7">계정당 1회</span>
        </button>
        <button class="plan-btn" data-plan="start" data-days="30" onclick="selectPlanBtn(this)">
          스타트패키지<br/><span style="font-size:11px;font-weight:400;opacity:0.7">₩199,000/월</span>
        </button>
        <button class="plan-btn vip-btn" data-plan="vip" data-days="30" onclick="selectPlanBtn(this)">
          VIP서비스<br/><span style="font-size:11px;font-weight:400;opacity:0.7">₩499,000/월</span>
        </button>
      </div>
      ` : `<p style="margin-bottom:20px;"><span class="badge badge-plan-${fixedPlan}">${PLAN_NAMES[fixedPlan]}</span> 연장</p>`}

      <p class="amodal-label">기간 (일)</p>
      <div class="days-row">
        <input type="number" class="days-input" id="modal-days" value="30" min="1" max="365" />
        <div class="days-stepper">
          <button class="step-btn" onclick="stepDays(1)">▲</button>
          <button class="step-btn" onclick="stepDays(-1)">▼</button>
        </div>
        <span style="color:var(--gray);font-size:13px;">일간 제공</span>
      </div>

      <div class="amodal-actions">
        <button class="btn-lime" style="flex:1;padding:12px;" onclick="submitPlanModal(${userId},'${fixedPlan || ''}')">적용</button>
        <button class="btn-ghost" style="padding:12px 20px;" onclick="closePlanModal()">취소</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.id = 'plan-modal-overlay';
}

function selectPlanBtn(el) {
  document.querySelectorAll('.plan-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  const days = el.dataset.days;
  if (days) document.getElementById('modal-days').value = days;
}

function stepDays(delta) {
  const input = document.getElementById('modal-days');
  const val = Math.min(365, Math.max(1, (parseInt(input.value) || 30) + delta));
  input.value = val;
}

function closePlanModal() {
  document.getElementById('plan-modal-overlay')?.remove();
}

async function submitPlanModal(userId, fixedPlan) {
  const days = parseInt(document.getElementById('modal-days').value) || 30;
  let plan = fixedPlan;

  if (!plan) {
    const selected = document.querySelector('.plan-btn.selected');
    if (!selected) { alert('플랜을 선택해주세요.'); return; }
    plan = selected.dataset.plan;
  }

  closePlanModal();

  const res = await fetch(`/api/admin/users/${userId}/plan`, {
    method: 'POST', credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ plan, extendDays: days }),
  });
  const data = await res.json();
  if (res.ok) { alert(`적용되었습니다. (${days}일)`); loadUsers(); loadStats(); }
  else alert(data.error || '오류');
}

function assignPlan(userId, userName) {
  openPlanModal({ userId, userName, title: '플랜 부여' });
}

function changePeriod(userId, userName, currentExpiry) {
  if (!currentExpiry) { alert('현재 플랜이 없습니다. 먼저 플랜을 부여하세요.'); return; }

  const overlay = document.createElement('div');
  overlay.className = 'amodal-overlay';
  overlay.id = 'period-modal-overlay';

  const cur = new Date(currentExpiry);
  const curStr = cur.toISOString().split('T')[0];
  const curLabel = cur.toLocaleDateString('ko-KR');

  overlay.innerHTML = `
    <div class="amodal-box">
      <h3>기간 변경</h3>
      <p class="amodal-sub">${userName}님 · 현재 만료일: <strong style="color:var(--lime);">${curLabel}</strong></p>

      <p class="amodal-label">새 만료일 직접 설정</p>
      <input type="date" id="period-date-input" value="${curStr}"
        style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);
               background:var(--card-bg);color:var(--white);font-size:15px;margin-bottom:16px;" />

      <p class="amodal-label" style="margin-top:4px;">또는 일수로 조정</p>
      <div class="days-row" style="margin-bottom:24px;">
        <button class="step-btn" style="width:36px;height:36px;font-size:18px;" onclick="adjustDate(-1)">−</button>
        <span id="adj-days" style="font-size:15px;color:var(--white);min-width:60px;text-align:center;">0일</span>
        <button class="step-btn" style="width:36px;height:36px;font-size:18px;" onclick="adjustDate(1)">+</button>
        <span style="color:var(--gray);font-size:13px;">(연장: +, 단축: −)</span>
      </div>

      <div class="amodal-actions">
        <button class="btn-lime" style="flex:1;padding:12px;" onclick="submitPeriodChange(${userId})">적용</button>
        <button class="btn-ghost" style="padding:12px 20px;" onclick="document.getElementById('period-modal-overlay').remove()">취소</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay._adjDays = 0;
  overlay._baseDate = curStr;
}

function adjustDate(delta) {
  const overlay = document.getElementById('period-modal-overlay');
  overlay._adjDays = (overlay._adjDays || 0) + delta;
  document.getElementById('adj-days').textContent = `${overlay._adjDays > 0 ? '+' : ''}${overlay._adjDays}일`;

  const base = new Date(overlay._baseDate);
  base.setDate(base.getDate() + overlay._adjDays);
  document.getElementById('period-date-input').value = base.toISOString().split('T')[0];
}

async function submitPeriodChange(userId) {
  const newDate = document.getElementById('period-date-input').value;
  if (!newDate) { alert('날짜를 선택해주세요.'); return; }

  document.getElementById('period-modal-overlay').remove();

  const res = await fetch(`/api/admin/users/${userId}/plan`, {
    method: 'POST', credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ expiresAt: newDate }),
  });
  const data = await res.json();
  if (res.ok) {
    alert(`만료일이 ${new Date(data.expiresAt).toLocaleDateString('ko-KR')}로 변경되었습니다.`);
    loadUsers();
  } else alert(data.error || '오류');
}

async function refundOrder(orderId, userName) {
  if (!confirm(`${userName}님의 주문 ${orderId}을 환불 처리하시겠습니까?\n\n플랜도 함께 해제됩니다.`)) return;

  const res = await fetch(`/api/admin/orders/${orderId}/refund`, {
    method: 'POST', credentials: 'include',
  });
  const data = await res.json();
  if (res.ok) { alert('환불 처리되었습니다. 플랜이 해제되었습니다.'); loadOrders(); loadUsers(); loadStats(); }
  else alert(data.error || '오류');
}

async function resetPassword(userId, userName) {
  const newPassword = prompt(`${userName}님의 새 비밀번호 (6자 이상):`);
  if (!newPassword) return;
  if (newPassword.length < 6) { alert('비밀번호는 6자 이상이어야 합니다.'); return; }
  if (!confirm(`${userName}님의 비밀번호를 "${newPassword}"로 변경하시겠습니까?`)) return;

  const res = await fetch(`/api/admin/users/${userId}/password`, {
    method: 'POST', credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ newPassword }),
  });
  const data = await res.json();
  if (res.ok) alert('비밀번호가 변경되었습니다.\n회원에게 새 비밀번호를 안내해 주세요.');
  else alert(data.error || '오류');
}

async function removePlan(userId, userName) {
  if (!confirm(`${userName}님의 플랜을 해제하시겠습니까? (환불 처리)`)) return;
  const res = await fetch(`/api/admin/users/${userId}/plan`, {
    method: 'POST', credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ plan: null }),
  });
  const data = await res.json();
  if (res.ok) { alert('해제되었습니다.'); loadUsers(); loadStats(); }
  else alert(data.error || '오류');
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/';
}

// 탭 전환
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
  });
});

(async () => {
  initYearFilter();
  if (await checkAdmin()) {
    await Promise.all([loadStats(), loadUsers(), loadOrders()]);
  }
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 실패 — 했제</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .result-box {
      text-align:center; padding:60px 48px;
      background:var(--card-bg); border:1px solid rgba(255,85,85,0.3);
      border-radius:20px; max-width:480px; width:100%;
    }
    .icon { font-size:56px; margin-bottom:24px; }
    h1 { font-size:28px; font-weight:900; margin-bottom:12px; }
    .err-msg { color:#ff5555; font-size:14px; margin-bottom:8px; }
    .desc { color:var(--gray); font-size:15px; margin-bottom:36px; }
    .actions { display:flex; gap:12px; justify-content:center; }
  </style>
</head>
<body>
<div class="result-box">
  <div class="icon">❌</div>
  <h1>결제에 실패했습니다</h1>
  <p class="err-msg" id="err-msg"></p>
  <p class="desc">다시 시도하거나 다른 결제 수단을 이용해 주세요.</p>
  <div class="actions">
    <a href="/#packages" class="btn-lime">다시 시도</a>
    <a href="/" class="btn-ghost">홈으로</a>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const msg = params.get('message');
if (msg) document.getElementById('err-msg').textContent = decodeURIComponent(msg);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 완료 — 했제</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .result-box {
      text-align:center; padding:60px 48px;
      background:var(--card-bg); border:1px solid var(--border);
      border-radius:20px; max-width:480px; width:100%;
    }
    .icon { font-size:56px; margin-bottom:24px; }
    h1 { font-size:28px; font-weight:900; margin-bottom:12px; }
    .desc { color:var(--gray); font-size:15px; margin-bottom:36px; line-height:1.7; }
    .actions { display:flex; gap:12px; justify-content:center; }
  </style>
</head>
<body>
<div class="result-box">
  <div class="icon">✅</div>
  <h1>결제가 완료되었습니다!</h1>
  <p class="desc">1영업일 이내 가입 이메일로<br/>사용 방법 및 프로그램을 안내드립니다.</p>
  <div class="actions">
    <a href="/dashboard" class="btn-lime">내 서비스 확인</a>
    <a href="/" class="btn-ghost">홈으로</a>
  </div>
</div>

<script>
// URL 파라미터에서 paymentKey, orderId, amount 추출 후 서버 승인
(async () => {
  const params = new URLSearchParams(location.search);
  const paymentKey = params.get('paymentKey');
  const orderId = params.get('orderId');
  const amount = Number(params.get('amount'));

  if (!paymentKey || !orderId || !amount) return;

  try {
    await fetch('/api/payment/confirm', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paymentKey, orderId, amount }),
    });
  } catch {}
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 — 했제</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { display:flex; flex-direction:column; min-height:100vh; }
    .auth-wrap {
      flex:1; display:flex; align-items:center; justify-content:center;
      padding:100px 24px 60px;
    }
    .auth-box {
      width:100%; max-width:440px;
      background:var(--card-bg); border:1px solid var(--border);
      border-radius:16px; padding:48px 40px;
    }
    .auth-logo { font-family:'Montserrat',sans-serif; font-size:20px; font-weight:900; margin-bottom:32px; }
    .auth-title { font-size:28px; font-weight:800; margin-bottom:8px; }
    .auth-sub { color:var(--gray); font-size:14px; margin-bottom:36px; }
    .form-group { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
    .form-group label { font-size:13px; font-weight:600; color:#ccc; }
    .form-group input {
      background:rgba(255,255,255,0.06); border:1px solid var(--border);
      border-radius:8px; padding:14px 16px; color:var(--white); font-size:15px;
      transition:border-color 0.2s; outline:none; width:100%;
    }
    .form-group input:focus { border-color:var(--lime); }
    .optional { color:var(--gray); font-size:11px; }
    .err { color:#ff5555; font-size:13px; margin-top:-12px; display:none; }
    .auth-footer { text-align:center; margin-top:24px; color:var(--gray); font-size:14px; }
    .auth-footer a { color:var(--lime); font-weight:600; }
    .terms { font-size:12px; color:var(--gray); text-align:center; margin-top:12px; }
  </style>
</head>
<body>
<nav id="navbar">
  <a href="/" class="logo">Haessje<span class="dot">.</span></a>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">Haessje<span class="dot">.</span></div>
    <h1 class="auth-title">회원가입</h1>
    <p class="auth-sub">무료로 가입하고 서비스를 시작하세요</p>

    <form id="register-form">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="name" placeholder="홍길동" required />
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="email" placeholder="example@email.com" required />
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="password" placeholder="8자 이상" required minlength="8" />
      </div>
      <div class="form-group">
        <label>비밀번호 확인</label>
        <input type="password" id="password2" placeholder="비밀번호 재입력" required />
      </div>
      <div class="form-group">
        <label>휴대폰 번호 <span class="optional">(선택)</span></label>
        <input type="tel" id="phone" placeholder="010-0000-0000" />
      </div>
      <p class="err" id="err-msg"></p>
      <button type="submit" class="btn-lime btn-full" style="margin-top:8px;" id="submit-btn">
        가입하기
      </button>
      <p class="terms">가입 시 <a href="#" style="color:var(--lime)">이용약관</a> 및 <a href="#" style="color:var(--lime)">개인정보처리방침</a>에 동의합니다</p>
    </form>

    <div class="auth-footer">
      이미 계정이 있으신가요? <a href="/login">로그인</a>
    </div>
  </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const err = document.getElementById('err-msg');
  err.style.display = 'none';

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const phone = document.getElementById('phone').value.trim();

  if (password !== password2) {
    err.textContent = '비밀번호가 일치하지 않습니다.'; err.style.display = 'block'; return;
  }

  btn.textContent = '처리 중...'; btn.disabled = true;

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, name, phone }),
    });
    const data = await res.json();
    if (!res.ok) {
      err.textContent = data.error; err.style.display = 'block';
    } else {
      window.location.href = '/dashboard';
    }
  } catch {
    err.textContent = '서버 오류가 발생했습니다.'; err.style.display = 'block';
  } finally {
    btn.textContent = '가입하기'; btn.disabled = false;
  }
});
</script>
</body>
</html>
